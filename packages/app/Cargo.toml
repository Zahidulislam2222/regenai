# Cargo workspace for @regenai/app Shopify Function extensions.
#
# Each extension compiles independently via `cargo build --release --target
# wasm32-wasip1 -p <crate>`. The `shopify app deploy` command bundles + ships
# all of them together as extensions on the packages/app Custom App
# (ADR-021).

[workspace]
resolver = "2"
members = [
    "extensions-shared",
    "extensions/cart-contraindication",
    "extensions/b2b-tiered-pricing",
    "extensions/delivery-customization",
    "extensions/discount-stacking",
]

[workspace.package]
edition = "2021"
version = "0.1.0"
license = "MIT"
repository = "https://github.com/Zahidulislam2222/regenai"
publish = false

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
# Shopify enforces a WASM size cap per extension (~1.5 MB). Optimise
# aggressively for code size, not speed — Function runs are short-lived.
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
