name: Test — Playwright E2E

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: test-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_STORE_PASSWORD: ${{ secrets.SHOPIFY_STORE_PASSWORD }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.SHOPIFY_STORE }}" ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.has-secrets == 'true'

      - name: Setup Node
        if: steps.check.outputs.has-secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps
        if: steps.check.outputs.has-secrets == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check.outputs.has-secrets == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        if: steps.check.outputs.has-secrets == 'true'
        run: npm --workspace packages/storefront run test:e2e
        continue-on-error: true  # allowed to skip until first spec lands (Day 8+)

      - name: Upload Playwright report
        if: always() && steps.check.outputs.has-secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/storefront/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Skip notice
        if: steps.check.outputs.has-secrets == 'false'
        run: echo "::notice::SHOPIFY_STORE secret not present — Playwright skipped"
