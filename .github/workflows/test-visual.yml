name: Test — Visual Regression (Percy)

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: test-visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  percy:
    name: Percy snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_STORE_PASSWORD: ${{ secrets.SHOPIFY_STORE_PASSWORD }}
      PREVIEW_URL: https://regenai-storefront-preview.regenai-workers.workers.dev
    steps:
      - name: Check required secrets + visual specs
        id: check
        # Three-way gate: need PERCY_TOKEN + SHOPIFY_STORE + at least one
        # spec under tests/visual/. Skips cleanly until all three land.
        run: |
          HAS_SPECS=false
          if [ -d packages/storefront/tests/visual ] && [ "$(find packages/storefront/tests/visual -name '*.spec.*' | wc -l)" -gt 0 ]; then
            HAS_SPECS=true
          fi
          if [ -z "${{ secrets.PERCY_TOKEN }}" ] || [ -z "${{ secrets.SHOPIFY_STORE }}" ] || [ "$HAS_SPECS" = "false" ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            echo "reason-specs=$HAS_SPECS" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.has-secrets == 'true'

      - name: Setup Node
        if: steps.check.outputs.has-secrets == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps
        if: steps.check.outputs.has-secrets == 'true'
        run: npm ci

      - name: Install Playwright
        if: steps.check.outputs.has-secrets == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Percy visual diff against live preview
        if: steps.check.outputs.has-secrets == 'true'
        working-directory: packages/storefront
        run: npx percy exec -- playwright test tests/visual

      - name: Skip notice
        if: steps.check.outputs.has-secrets == 'false'
        run: echo "::notice::Percy skipped — need PERCY_TOKEN + SHOPIFY_STORE + tests/visual/ specs. Activates when first visual spec lands."
