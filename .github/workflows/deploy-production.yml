name: Deploy — Production (main)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production release'
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

# Post-ADR-011 pivot: production storefront lives on Cloudflare Workers.
# The `production` GH environment adds required-reviewer gate.

jobs:
  confirm:
    name: Gate — require explicit confirmation on manual trigger
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "::error::Must type 'deploy' to confirm"
            exit 1
          fi

  storefront-production:
    name: Storefront production (CF Workers)
    needs: [confirm]
    if: |
      always() &&
      (needs.confirm.result == 'success' || needs.confirm.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 12
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}" ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.has-secrets == 'true'

      - name: Setup Node
        if: steps.check.outputs.has-secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps
        if: steps.check.outputs.has-secrets == 'true'
        run: npm ci

      - name: Build Hydrogen storefront
        if: steps.check.outputs.has-secrets == 'true'
        working-directory: packages/storefront
        run: npx shopify hydrogen build
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PUBLIC_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE }}
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}
          PUBLIC_STOREFRONT_ID: ${{ secrets.PUBLIC_STOREFRONT_ID }}

      - name: Deploy to Cloudflare Workers (production)
        if: steps.check.outputs.has-secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/storefront
          command: deploy --env production
        env:
          SHOPIFY_STOREFRONT_API_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}
          SHOPIFY_STOREFRONT_PRIVATE_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PRIVATE_TOKEN }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          SENTRY_STOREFRONT_DSN: ${{ secrets.SENTRY_STOREFRONT_DSN }}

      - name: Deploy custom app (activates Day 15+ once provisioned)
        # Gate on SHOPIFY_APP_CLIENT_ID — only set after user completes
        # D15.6 (wrangler d1 create + kv namespace create + Partners
        # admin Custom App creation + wrangler secret put). Until then
        # the app's D1/KV bindings in wrangler.toml are placeholders
        # and `wrangler deploy` would fail at bundle time.
        if: steps.check.outputs.has-secrets == 'true' && env.APP_READY != ''
        env:
          APP_READY: ${{ secrets.SHOPIFY_APP_CLIENT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -d packages/app ]; then
            cd packages/app && npm run build && npx wrangler deploy --env production
          else
            echo "::notice::packages/app not present — app production deploy skipped"
          fi

      - name: Skip notice
        if: steps.check.outputs.has-secrets == 'false'
        run: echo "::notice::Production deploy skipped — needs CLOUDFLARE_API_TOKEN + SHOPIFY_STOREFRONT_PUBLIC_TOKEN (see ADR-011)"
