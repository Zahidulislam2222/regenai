name: Deploy — Preview (Cloudflare Workers per PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: deploy-preview-${{ github.ref }}
  cancel-in-progress: true

# Post-ADR-011 pivot: storefront + custom app both deploy to Cloudflare
# Workers on PR. Oxygen is unavailable on dev stores (Shopify policy).
# Gate on CLOUDFLARE_API_TOKEN (mint at dash.cloudflare.com) +
# SHOPIFY_STOREFRONT_PUBLIC_TOKEN (from Headless channel).

jobs:
  storefront-preview:
    name: Storefront preview (CF Workers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}" ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.has-secrets == 'true'

      - name: Setup Node
        if: steps.check.outputs.has-secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps
        if: steps.check.outputs.has-secrets == 'true'
        run: npm ci

      - name: Build Hydrogen storefront
        if: steps.check.outputs.has-secrets == 'true'
        working-directory: packages/storefront
        run: npx shopify hydrogen build
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-preview-session-secret-placeholder-32-chars-min' }}
          PUBLIC_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE }}
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}
          PUBLIC_STOREFRONT_ID: ${{ secrets.PUBLIC_STOREFRONT_ID }}

      - name: Deploy to Cloudflare Workers (preview)
        if: steps.check.outputs.has-secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/storefront
          command: deploy --env preview --name regenai-storefront-pr-${{ github.event.pull_request.number }}
          secrets: |
            SHOPIFY_STOREFRONT_API_TOKEN
            SHOPIFY_STOREFRONT_PRIVATE_TOKEN
            SESSION_SECRET
            SENTRY_STOREFRONT_DSN
        env:
          SHOPIFY_STOREFRONT_API_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}
          SHOPIFY_STOREFRONT_PRIVATE_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PRIVATE_TOKEN }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-preview-session-secret-placeholder-32-chars-min' }}
          SENTRY_STOREFRONT_DSN: ${{ secrets.SENTRY_STOREFRONT_DSN }}

      - name: Skip notice
        if: steps.check.outputs.has-secrets == 'false'
        run: echo "::notice::Storefront preview skipped — needs CLOUDFLARE_API_TOKEN + SHOPIFY_STOREFRONT_PUBLIC_TOKEN in GH Secrets (see ADR-011)"

  app-preview:
    name: Custom app preview (activates Day 15+)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Check app + secrets
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ ! -d packages/app ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check.outputs.has-secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps
        if: steps.check.outputs.has-secrets == 'true'
        run: npm ci

      - name: Deploy custom app preview
        if: steps.check.outputs.has-secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/app
          command: deploy --env preview --name regenai-app-pr-${{ github.event.pull_request.number }}

      - name: Skip notice
        if: steps.check.outputs.has-secrets == 'false'
        run: echo "::notice::Custom app preview skipped — packages/app not yet scaffolded (Day 15+)"
