name: Lighthouse CI

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI (perf + a11y + seo + best-practices budgets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check required secrets
        id: check
        # Lighthouse now audits the live Cloudflare Workers preview URL
        # (ADR-011 pivot). No local build needed. Gate on
        # SHOPIFY_STOREFRONT_PUBLIC_TOKEN to confirm the preview URL has
        # real tokens behind it; when that secret is set, the deploy
        # workflow keeps the preview URL fresh on every main push.
        run: |
          if [ -z "${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}" ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.has-secrets == 'true'

      - name: Lighthouse CI (live preview URL)
        if: steps.check.outputs.has-secrets == 'true'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: 'lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Skip notice
        if: steps.check.outputs.has-secrets == 'false'
        run: echo "::notice::Lighthouse skipped — SHOPIFY_STOREFRONT_PUBLIC_TOKEN not yet provisioned. Install the Headless channel on the dev store (ADR-011) to activate."
