name: Lighthouse CI

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI (perf + a11y + seo + best-practices budgets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_STORE_PASSWORD: ${{ secrets.SHOPIFY_STORE_PASSWORD }}
    steps:
      - name: Check required secrets
        id: check
        # Lighthouse needs a Hydrogen build. We gate on
        # SHOPIFY_STOREFRONT_PUBLIC_TOKEN (empty until the Headless channel
        # is installed on the dev store and the public token is synced into
        # GH Secrets — see ADR-011).
        run: |
          if [ -z "${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}" ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.has-secrets == 'true'

      - name: Setup Node
        if: steps.check.outputs.has-secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps
        if: steps.check.outputs.has-secrets == 'true'
        run: npm ci

      - name: Build storefront
        if: steps.check.outputs.has-secrets == 'true'
        working-directory: packages/storefront
        run: npx shopify hydrogen build
        env:
          SESSION_SECRET: ci-lighthouse-session-secret-placeholder-32-chars-min
          PUBLIC_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE }}
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}
          PUBLIC_STOREFRONT_ID: ${{ secrets.PUBLIC_STOREFRONT_ID }}

      - name: Lighthouse CI
        if: steps.check.outputs.has-secrets == 'true'
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: 'lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true  # hard budget enforcement lands at D16 once budget.json is tuned

      - name: Skip notice
        if: steps.check.outputs.has-secrets == 'false'
        run: echo "::notice::Lighthouse skipped — SHOPIFY_STOREFRONT_PUBLIC_TOKEN not yet provisioned. Install the Headless channel on the dev store (ADR-011) to activate."
