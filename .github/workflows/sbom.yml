name: Security — SBOM (Syft + CycloneDX)

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  sbom:
    name: Generate SBOM on release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps (for accurate SBOM)
        run: npm ci

      - name: Generate SBOM via Syft
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOMs to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            sbom.cyclonedx.json
            sbom.spdx.json
