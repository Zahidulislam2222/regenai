name: Lint

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint + Prettier + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install workspace deps (include optional for platform-specific binaries)
        run: npm ci --include=optional

      - name: Rebuild native modules for Linux (lightningcss, etc.)
        run: npm rebuild --workspaces --if-present

      - name: ESLint + Prettier (via Shopify eslint-plugin-prettier integration)
        run: npm run lint --workspaces --if-present

      - name: Generate React Router types
        # `./+types/*` modules + `virtual:react-router/server-build` come
        # from `react-router typegen`. lightningcss cross-platform fix
        # unblocks this in CI (it was deferred in D3.5).
        working-directory: packages/storefront
        run: npx react-router typegen

      - name: TypeScript typecheck (storefront)
        working-directory: packages/storefront
        run: npx tsc --noEmit --skipLibCheck
