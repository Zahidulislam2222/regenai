name: Lint

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint + Prettier + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install workspace deps (include optional for platform-specific binaries)
        run: npm ci --include=optional

      - name: Rebuild native modules for Linux (lightningcss, etc.)
        run: npm rebuild --workspaces --if-present

      - name: ESLint + Prettier (via Shopify eslint-plugin-prettier integration)
        run: npm run lint --workspaces --if-present

      - name: TypeScript typecheck (storefront)
        # Uses the workspace's hoisted tsc via npx. skipLibCheck avoids
        # noise from Hydrogen generated types; real type errors surface.
        # Previous `|| true` masking removed now that the lightningcss
        # cross-platform issue is resolved via root optionalDependencies
        # + scripts/rebuild-native.mjs postinstall.
        working-directory: packages/storefront
        run: npx tsc --noEmit --skipLibCheck
