name: Deploy — Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

# Post-ADR-011 pivot: all deploys go to Cloudflare Workers (Oxygen blocked
# on dev stores). Storefront uses tokens from the Headless sales channel.

jobs:
  storefront-staging:
    name: Storefront staging (CF Workers)
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}" ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.has-secrets == 'true'

      - name: Setup Node
        if: steps.check.outputs.has-secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps
        if: steps.check.outputs.has-secrets == 'true'
        run: npm ci

      - name: Build Hydrogen storefront
        if: steps.check.outputs.has-secrets == 'true'
        working-directory: packages/storefront
        run: npx shopify hydrogen build
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PUBLIC_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE }}
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}
          PUBLIC_STOREFRONT_ID: ${{ secrets.PUBLIC_STOREFRONT_ID }}

      - name: Deploy to Cloudflare Workers (staging)
        if: steps.check.outputs.has-secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/storefront
          command: deploy --env staging
        env:
          SHOPIFY_STOREFRONT_API_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}
          SHOPIFY_STOREFRONT_PRIVATE_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PRIVATE_TOKEN }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          SENTRY_STOREFRONT_DSN: ${{ secrets.SENTRY_STOREFRONT_DSN }}

      - name: Deploy custom app (activates Day 15+ once provisioned)
        if: steps.check.outputs.has-secrets == 'true' && env.APP_READY != ''
        env:
          APP_READY: ${{ secrets.SHOPIFY_APP_CLIENT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -d packages/app ]; then
            cd packages/app && npm run build && npx wrangler deploy --env staging
          else
            echo "::notice::packages/app not present — app staging deploy skipped"
          fi

      - name: Skip notice
        if: steps.check.outputs.has-secrets == 'false'
        run: echo "::notice::Staging deploy skipped — needs CLOUDFLARE_API_TOKEN + SHOPIFY_STOREFRONT_PUBLIC_TOKEN (see ADR-011)"
