name: Test — Unit + Component

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: test-unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Vitest (unit + component)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Vitest — storefront
        # Run the explicit test:unit script (non-watch, no coverage).
        # Coverage-v8 dep isn't installed yet; re-enable when @vitest/coverage-v8
        # is added (D16 test expansion).
        run: npm --workspace packages/storefront run test:unit

      - name: Vitest — @regenai/ui
        # UI workspace has no tests yet (components get Storybook-only
        # coverage until D13 publish gate). --passWithNoTests lets the job
        # pass cleanly; will tighten once ui specs land.
        run: npm --workspace packages/ui run test -- --passWithNoTests
